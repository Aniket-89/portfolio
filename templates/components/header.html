{% load static %}
<header class="bg-blue-950">
  <div class="flex justify-between items-center py-6 px-10 text-slate-200">
    <div class="flex gap-3 items-center">
      <div class="logo-container w-14" id="header-logo">
        <img src="{% static 'core/img/logo.jpeg' %}" alt="Aniket" class="logo">
      </div>
      <div class="header-title flex-1 text-center">Aniket's Portfolio</div>
    </div>
    <nav class="navbar flex items-center gap-10">
      <ul class="nav-links hidden md:flex">
        <li class="nav-link mr-6"><a href="{% url 'core:index' %}" class="link">Home</a></li>
        <li class="nav-link mr-6"><a href="project-section" class="link">Works</a></li>
        <li class="nav-link mr-6"><a href="#" class="link">Resume</a></li>
        <li class="nav-link mr-6"><a href="#" class="link">Blog</a></li>
      </ul>
      <button class="cta-btn text-nowrap absolute right-4 bottom-4 z-10 md:static md:self-center bg-violet-500 p-2 text-lg text-gray-200 rounded-sm font-bold hover:bg-violet-200 hover:text-slate-800 transition-colors">Contact Me</button>
      <div class="mobile-menu-icon md:hidden h-9 w-9">
        <a href="#" id="mobile-menu-toggle">
          <svg class="menu-icon-closed" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="50" height="50" viewBox="0 0 50 50">
            <path d="M 5 9 L 5 11 L 45 11 L 45 9 L 5 9 z M 5 24 L 5 26 L 45 26 L 45 24 L 5 24 z M 5 39 L 5 41 L 45 41 L 45 39 L 5 39 z"></path>
          </svg>
          <svg class="menu-icon-open hidden" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="50" height="50" viewBox="0 0 50 50">
            <path d="M 7.71875 6.28125 L 6.28125 7.71875 L 23.5625 25 L 6.28125 42.28125 L 7.71875 43.71875 L 25 26.4375 L 42.28125 43.71875 L 43.71875 42.28125 L 26.4375 25 L 43.71875 7.71875 L 42.28125 6.28125 L 25 23.5625 Z"></path>
          </svg>
        </a>
      </div>
    </nav>
  </div>

  <div class="mobile-menu fixed right-0 w-3/4 h-screen text-blue-100 text-2xl p-8 bg-gray-800 overflow-auto transition-all duration-300 ease-in-out transform translate-x-full" id="mobile-menu">
    <nav class="navbar">
      <ul class="nav-links inline-flex flex-col gap-7">
        <li class="nav-link ml-6"><a href="{% url 'core:index' %}" class="link">Home</a></li>
        <li class="nav-link ml-6"><a href="project-section" class="link">Works</a></li>
        <li class="nav-link ml-6"><a href="#" class="link">Resume</a></li>
        <li class="nav-link ml-6"><a href="#" class="link">Blog</a></li>
      </ul>
    </nav>
  </div>

  <script>
    const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    mobileMenuToggle.addEventListener('click', () => {
      mobileMenu.classList.toggle('translate-x-full');
      mobileMenuToggle.querySelector('.menu-icon-closed').classList.toggle('hidden');
      mobileMenuToggle.querySelector('.menu-icon-open').classList.toggle('hidden');
    });
  </script>
</header>
